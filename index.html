<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brittany's Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Scale all rem-based text up ~15% for readability */
html { font-size: 115%; }

:root {
  --cream:  #ffefdd;
  --green:  #043000;
  --pink:   #f094a3;
  --gold:   #efb001;
  --coral:  #e24d49;
  --white:  #ffffff;
  --green2: rgba(4,48,0,0.08);
  --green3: rgba(4,48,0,0.15);
}

body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--green);
  padding: 34px 30px 56px;
  min-width: 900px;
}

/* ── HEADER ─────────────────────────────────────── */
.dashboard-title {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--coral);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.dashboard-date {
  text-align: center;
  font-size: 0.82rem;
  color: var(--green);
  opacity: 0.5;
  margin-bottom: 28px;
  font-style: italic;
}

/* ── SECTION HEADERS ─────────────────────────────── */
.section-header {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 900;
  color: var(--coral);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 32px 0 14px;
}

.section-header em {
  font-weight: 400;
  font-size: 1rem;
  letter-spacing: 0.04em;
}

/* ── ROW 1: THREE GREEN CARDS ────────────────────── */
.row-three {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}

.green-card {
  background: var(--green);
  border-radius: 14px;
  padding: 26px;
  min-height: 260px;
}

.card-label {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(239,176,1,0.25);
}

/* ── MEETINGS IN TODAY'S PLATE ───────────────────── */
.meeting-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.meeting-row:last-of-type { border-bottom: none; }

.meeting-time-badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  white-space: nowrap;
}

.meeting-title-text {
  color: var(--white);
  font-size: 0.82rem;
  font-weight: 500;
  line-height: 1.4;
}

.plate-divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.12);
  margin: 10px 0;
}

.plate-sub-label {
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: rgba(239,176,1,0.6);
  margin-bottom: 8px;
}

/* Tasks in green card */
.task-row {
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.task-row:last-child { border-bottom: none; }

.task-name {
  color: var(--white);
  font-size: 0.83rem;
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 4px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.tag {
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  padding: 2px 6px;
  border-radius: 4px;
}

.tag-urgent  { background: var(--coral);  color: white; }
.tag-high    { background: #e07a30;       color: white; }
.tag-medium  { background: var(--gold);   color: var(--green); }
.tag-low     { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
.tag-eco     { background: rgba(239,176,1,0.18); color: var(--gold); }
.tag-time    { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); }
.tag-blocked { background: var(--coral); color: white; }
.tag-energy-high   { background: rgba(226,77,73,0.3); color: var(--coral); }
.tag-energy-medium { background: rgba(239,176,1,0.3); color: var(--gold); }
.tag-energy-low    { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }

/* Habits */
.habit-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.habit-row:last-of-type { border-bottom: none; }

.habit-dot {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  flex-shrink: 0;
}

.habit-name {
  flex: 1;
  color: var(--white);
  font-size: 0.82rem;
}

.habit-cat {
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(239,176,1,0.18);
  color: var(--gold);
}

.habit-score {
  color: var(--gold);
  font-size: 0.75rem;
  text-align: center;
  margin-top: 12px;
  font-weight: 600;
}
.habit-type-label {
  font-size: 0.58rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin: 9px 0 1px;
  opacity: 0.9;
}

/* Monthly rhythm rings */
.rhythm-wrap {
  background: var(--green);
  border-radius: 16px;
  padding: 18px 22px 24px;
  margin-bottom: 26px;
}
.rhythm-legend {
  display: flex;
  gap: 18px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.rl-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--white);
  font-size: 0.66rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.rl-dot { width: 10px; height: 10px; border-radius: 50%; }
.ring-cal {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
.ring-head {
  text-align: center;
  color: rgba(255,255,255,0.45);
  font-size: 0.6rem;
  font-weight: 700;
  padding-bottom: 4px;
}
.ring-empty { aspect-ratio: 1; }
.ring-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 5px 0;
  border-radius: 10px;
}
.ring-today { background: rgba(255,255,255,0.09); }
.ring-svg { width: 40px; height: 40px; }
.ring-future { opacity: 0.45; }
.ring-daynum {
  color: rgba(255,255,255,0.55);
  font-size: 0.56rem;
  margin-top: 3px;
  font-weight: 600;
}
.ring-today .ring-daynum { color: var(--gold); }

/* Compact rhythm — fits inside a third-width column on the Personal page */
.rhythm-compact .rhythm-legend { gap: 9px; margin-bottom: 12px; }
.rhythm-compact .rl-item { font-size: 0.56rem; gap: 4px; }
.rhythm-compact .rl-dot { width: 8px; height: 8px; }
.rhythm-compact .ring-cal { gap: 3px; }
.rhythm-compact .ring-head { font-size: 0.52rem; padding-bottom: 2px; }
.rhythm-compact .ring-day { padding: 2px 0; border-radius: 7px; }
.rhythm-compact .ring-svg { width: 100%; height: auto; }
.rhythm-compact .ring-daynum { font-size: 0.5rem; margin-top: 1px; }

/* Inventory alerts */
.alert-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.alert-row:last-child { border-bottom: none; }

.alert-info { flex: 1; }
.alert-item-name { color: var(--white); font-size: 0.83rem; font-weight: 500; }
.alert-cat { color: rgba(255,255,255,0.45); font-size: 0.68rem; margin-top: 1px; }
.tag-low-inv { background: var(--coral); color: white; }
.tag-order   { background: var(--gold);  color: var(--green); }

/* Empty states */
.empty-light {
  color: rgba(255,255,255,0.3);
  font-size: 0.78rem;
  font-style: italic;
  text-align: center;
  padding: 30px 0 10px;
}

.empty-dark {
  color: rgba(4,48,0,0.3);
  font-size: 0.78rem;
  font-style: italic;
  text-align: center;
  padding: 20px 0 10px;
}

/* ── WEEK STRIP ──────────────────────────────────── */
.week-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 14px;
}

.day-card {
  background: var(--pink);
  border-radius: 12px;
  padding: 12px 8px 14px;
  min-height: 130px;
}

.day-card.today {
  background: var(--gold);
  box-shadow: 0 4px 16px rgba(239,176,1,0.35);
}

.day-letter {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.2rem;
  color: var(--green);
  text-align: center;
}

.day-num {
  font-size: 0.6rem;
  color: rgba(4,48,0,0.55);
  text-align: center;
  margin-bottom: 8px;
}

.day-task-chip {
  font-size: 0.6rem;
  color: var(--green);
  background: rgba(4,48,0,0.1);
  border-radius: 4px;
  padding: 2px 5px;
  margin-bottom: 3px;
  line-height: 1.4;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* ── MEETING CHIPS IN WEEK STRIP ─────────────────── */
.day-meeting-chip {
  font-size: 0.6rem;
  color: var(--green);
  background: rgba(255,255,255,0.55);
  border-radius: 4px;
  padding: 2px 5px;
  margin-bottom: 3px;
  line-height: 1.4;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  border-left: 2px solid var(--green);
}

.day-more {
  font-size: 0.58rem;
  color: rgba(4,48,0,0.5);
  text-align: center;
  margin-top: 4px;
}

.day-open {
  font-size: 0.62rem;
  color: rgba(4,48,0,0.35);
  text-align: center;
  font-style: italic;
  margin-top: 14px;
}

/* ── ECOSYSTEM REVIEW ────────────────────────────── */
.eco-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 16px;
}

.eco-card {
  text-align: center;
}

.eco-name {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
  line-height: 1.3;
  min-height: 24px;
}

.eco-chart-wrap {
  position: relative;
  width: 100%;
  padding-bottom: 100%;
}

.eco-chart-wrap canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100% !important;
  height: 100% !important;
}

.eco-legend {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.eco-leg-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.58rem;
  color: var(--green);
  opacity: 0.7;
}

.eco-leg-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── PROVISION PLANNING ──────────────────────────── */
.provision-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 20px;
}

.provision-card {
  background: var(--white);
  border: 2px solid rgba(4,48,0,0.12);
  border-radius: 14px;
  padding: 22px 20px;
  min-height: 200px;
}

.provision-card.gold {
  background: var(--gold);
  border-color: var(--gold);
}

.provision-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 0.78rem;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  text-align: center;
  margin-bottom: 14px;
  line-height: 1.4;
}

/* Bills */
.bill-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--green3);
  font-size: 0.78rem;
}
.bill-row:last-child { border-bottom: none; }
.bill-name { color: var(--green); font-weight: 500; }
.bill-amt  { color: var(--coral); font-weight: 700; }

/* Budget bars */
.budget-row { margin-bottom: 10px; }
.budget-lbl {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: var(--green);
  margin-bottom: 4px;
}
.bar-bg {
  height: 7px;
  background: var(--green2);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s ease;
}

/* Wish list */
.wish-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 7px 0;
  border-bottom: 1px solid rgba(4,48,0,0.12);
  font-size: 0.78rem;
}
.wish-row:last-child { border-bottom: none; }
.wish-name { color: var(--green); font-weight: 500; flex: 1; }
.wish-store { font-size: 0.62rem; color: rgba(4,48,0,0.5); }
.wish-cost { color: var(--green); font-weight: 700; margin-left: 8px; }

/* Time tracker */
.time-row {
  padding: 7px 0;
  border-bottom: 1px solid rgba(4,48,0,0.12);
  font-size: 0.75rem;
}
.time-row:last-of-type { border-bottom: none; }
.time-project { font-weight: 600; color: var(--green); }
.time-meta { color: rgba(4,48,0,0.55); font-size: 0.65rem; margin-top: 2px; }
.time-total {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 2px solid var(--green);
  display: flex;
  justify-content: space-between;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--green);
}

/* Time tracker timer */
.pw-timer {
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(4,48,0,0.18);
}
.pw-clock {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 1.9rem;
  color: var(--green);
  text-align: center;
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
}
.pw-clock.running { color: var(--coral); }
.pw-btns {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin: 10px 0 4px;
}
.pw-btn {
  flex: 1;
  border: none;
  border-radius: 8px;
  padding: 7px 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  background: var(--green);
  color: var(--cream);
  transition: opacity 0.15s ease;
}
.pw-btn:hover { opacity: 0.85; }
.pw-btn.ghost {
  background: rgba(4,48,0,0.12);
  color: var(--green);
}
.pw-btn:disabled { opacity: 0.4; cursor: default; }
.pw-fields { display: grid; gap: 6px; margin-top: 8px; }
.pw-fields input, .pw-fields select {
  width: 100%;
  box-sizing: border-box;
  border: 1px solid rgba(4,48,0,0.25);
  border-radius: 7px;
  padding: 6px 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  color: var(--green);
  background: var(--cream);
}
.pw-fields input::placeholder { color: rgba(4,48,0,0.45); }
.pw-two { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.pw-log {
  width: 100%;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  padding: 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  background: var(--green);
  color: var(--gold);
}
.pw-log:disabled { opacity: 0.5; cursor: default; }
.pw-toggle {
  display: block;
  text-align: center;
  font-size: 0.64rem;
  color: rgba(4,48,0,0.6);
  margin-top: 8px;
  cursor: pointer;
  text-decoration: underline;
}
.pw-status {
  text-align: center;
  font-size: 0.66rem;
  margin-top: 6px;
  min-height: 0.8em;
}
.pw-status.ok  { color: var(--green); font-weight: 700; }
.pw-status.err { color: var(--coral); font-weight: 700; }

/* ── LOADING ─────────────────────────────────────── */
.loading {
  text-align: center;
  padding: 80px 40px;
  color: var(--coral);
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-style: italic;
}
/* ── ECOSYSTEM CARD → CLICKABLE ──────────────────── */
.eco-card-link { cursor: pointer; transition: transform .12s ease, box-shadow .12s ease; position: relative; }
.eco-card-link:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(4,48,0,0.14); }
.eco-open-hint {
  font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--coral); opacity: 0; transition: opacity .12s ease; margin-top: 8px; text-align: center;
}
.eco-card-link:hover .eco-open-hint { opacity: 1; }

/* ── INTERIOR PAGE ───────────────────────────────── */
.back-link {
  display: inline-block; cursor: pointer; font-size: 0.72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em; color: var(--coral);
  margin-bottom: 14px; user-select: none;
}
.back-link:hover { text-decoration: underline; }

.stat-strip { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 6px; }
.stat-pill {
  background: var(--green); border-radius: 12px; padding: 14px 22px; text-align: center; min-width: 96px;
}
.stat-pill .stat-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--white); line-height: 1; }
.stat-pill .stat-lbl { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gold); margin-top: 6px; }

.row-two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.task-group-label {
  font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
  color: rgba(239,176,1,0.7); margin: 14px 0 8px; padding-bottom: 6px;
  border-bottom: 1px solid rgba(239,176,1,0.2);
}
.task-group-label:first-of-type { margin-top: 0; }
.task-done .task-name { opacity: 0.55; text-decoration: line-through; }

.tag-due { background: rgba(94,141,239,0.25); color: #aac3fb; }
.tag-overdue { background: var(--coral); color: white; }
.tag-assignee-me        { background: rgba(63,174,106,0.28); color: #8be0ac; }
.tag-assignee-claude    { background: rgba(94,141,239,0.28); color: #aac3fb; }
.tag-assignee-external  { background: rgba(226,77,73,0.28); color: #f3a6a4; }
.tag-assignee-together  { background: rgba(176,124,240,0.28); color: #d9c2f7; }

.note-row { padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.note-row:last-child { border-bottom: none; }
.note-row .note-src { font-size: 0.7rem; font-weight: 700; color: var(--gold); margin-bottom: 3px; }
.note-row .note-body { color: rgba(255,255,255,0.85); font-size: 0.8rem; line-height: 1.45; }

.log-row { display: flex; gap: 10px; align-items: baseline; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.log-row:last-child { border-bottom: none; }
.log-row .log-date { font-size: 0.62rem; font-weight: 700; color: rgba(239,176,1,0.7); white-space: nowrap; flex-shrink: 0; min-width: 58px; }
.log-row .log-text { color: rgba(255,255,255,0.85); font-size: 0.8rem; line-height: 1.4; }
/* ════════════════════════════════════════════════════
   MOBILE / PHONE LAYOUT  (desktop unchanged above)
   Activates on screens ≤ 680px wide. Purely additive.
   ════════════════════════════════════════════════════ */
@media (max-width: 680px) {
  html { font-size: 100%; }                 /* desktop is bumped to 115%; ease back on small screens */
  body { min-width: 0; padding: 16px 13px 40px; }

  .dashboard-title { font-size: 1.4rem; letter-spacing: 0.03em; }
  .dashboard-date  { font-size: 0.78rem; margin-bottom: 18px; }
  .section-header  { font-size: 1.02rem; margin: 24px 0 12px; }
  .section-header em { font-size: 0.82rem; }

  /* Stack every multi-column layout into one column */
  .row-three, .row-two, .provision-grid { grid-template-columns: 1fr; gap: 14px; }

  /* Ecosystem cards: two-up grid, always show the "View page →" hint (no hover on touch) */
  .eco-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .eco-card-link .eco-open-hint { opacity: 1; }

  .green-card { padding: 20px; min-height: 0; }
  .rhythm-wrap { padding: 16px 14px 18px; margin-bottom: 18px; }

  /* Habit rings: keep the 7-day calendar but let the rings scale to fit */
  .ring-svg { width: 100%; height: auto; }
  .ring-cal { gap: 4px; }
  .ring-daynum { font-size: 0.5rem; }
  .rhythm-legend { gap: 10px; }
  .rl-item { font-size: 0.6rem; }

  /* Week in Review: turn the 7-across grid into a swipeable horizontal strip */
  .week-strip { display: flex; overflow-x: auto; gap: 10px; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
  .day-card { flex: 0 0 auto; min-width: 78px; min-height: 110px; }

  /* Interior page: bigger tap targets, tighter stat strip */
  .back-link { font-size: 0.82rem; padding: 6px 0; }
  .stat-strip { gap: 8px; }
  .stat-pill { padding: 12px 16px; min-width: 78px; }
  .stat-pill .stat-num { font-size: 1.3rem; }

  /* Parker Wells timer controls: easier to press */
  .pw-clock { font-size: 1.6rem; }
  .pw-btn { padding: 11px 14px; }
}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading your command center...</div></div>

<script>
const ECOSYSTEMS = ['GOTR','Maroon','Mellow Yellow','APC','Parker Wells','Job Search','Personal'];
const DAYS = ['S','M','T','W','Th','F','S'];
const ecoCharts = {};

// Shared habit ring config (used by home "Daily Habits" + the Monthly Rhythm calendar)
const HABIT_TYPE_COLORS = { MIND:'#5b8def', BODY:'#e24d49', SOUL:'#b07cf0', ENVIRONMENT:'#3fae6a' };
const HABIT_TYPE_ORDER_G = ['MIND','BODY','SOUL','ENVIRONMENT'];

// Reusable Monthly Rhythm calendar (legend + ring grid). Self-contained: computes its own month.
function monthlyRhythmInner(data) {
  const now = today();
  const hDefs = data.habitDefs || [];
  const habitDays = data.habitDays || [];
  const legend = HABIT_TYPE_ORDER_G.map(t =>
    `<div class="rl-item"><span class="rl-dot" style="background:${HABIT_TYPE_COLORS[t]}"></span>${t}</div>`).join('');
  const yr = now.getFullYear(), mo = now.getMonth();
  const startWeekday = new Date(yr, mo, 1).getDay();
  const numDays = new Date(yr, mo+1, 0).getDate();
  const dayMap = {};
  habitDays.forEach(d => { dayMap[d.date] = d.checks; });
  const heads = ['S','M','T','W','T','F','S'].map(d => `<div class="ring-head">${d}</div>`).join('');
  let cells = Array.from({length:startWeekday}).map(() => `<div class="ring-empty"></div>`).join('');
  for (let dd=1; dd<=numDays; dd++) {
    const dateStr = `${yr}-${String(mo+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const checks = dayMap[dateStr] || {};
    const isToday = dd === now.getDate();
    const future = dd > now.getDate();
    const rings = HABIT_TYPE_ORDER_G.map((type, ti) => {
      const r = 16 - ti*3.4;
      const C = 2*Math.PI*r;
      const hs = hDefs.filter(h => h.type===type);
      const done = hs.filter(h => checks[h.name]).length;
      const frac = hs.length ? done/hs.length : 0;
      return `<circle cx="18" cy="18" r="${r.toFixed(2)}" fill="none" stroke="${HABIT_TYPE_COLORS[type]}" stroke-opacity="0.13" stroke-width="2.6"/><circle cx="18" cy="18" r="${r.toFixed(2)}" fill="none" stroke="${HABIT_TYPE_COLORS[type]}" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="${(frac*C).toFixed(2)} ${C.toFixed(2)}"/>`;
    }).join('');
    cells += `<div class="ring-day${isToday?' ring-today':''}">
      <svg viewBox="0 0 36 36" class="ring-svg${future?' ring-future':''}"><g transform="rotate(-90 18 18)">${rings}</g></svg>
      <div class="ring-daynum">${dd}</div>
    </div>`;
  }
  return `<div class="rhythm-legend">${legend}</div><div class="ring-cal">${heads}${cells}</div>`;
}

function today() { return new Date(); }
function todayStr() { const d=today(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function getWeek() {
  const t = today();
  const sun = new Date(t); sun.setDate(t.getDate() - t.getDay());
  return Array.from({length:7}, (_,i) => { const d=new Date(sun); d.setDate(sun.getDate()+i); return d; });
}

function fmt$(n) {
  if (n == null) return '—';
  return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function priorityTag(p) {
  if (!p) return '';
  const label = p.replace('🔴 ','');
  const cls = p.includes('Urgent')?'urgent':p==='High'?'high':p==='Medium'?'medium':'low';
  return `<span class="tag tag-${cls}">${label}</span>`;
}

function energyTag(e) {
  if (!e) return '';
  return `<span class="tag tag-energy-${e.toLowerCase()}">${e} energy</span>`;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

// Format ISO datetime → "10am" / "10:30am"
function fmtCalTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return m === 0 ? `${h}${ampm}` : `${h}:${String(m).padStart(2,'0')}${ampm}`;
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function renderEcoChart(id, done, inProg, todo) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (ecoCharts[id]) ecoCharts[id].destroy();
  const total = done + inProg + todo;
  const donePct = total ? Math.round(done/total*100) : 0;

  // Plugin: draw the completion % in the center of the doughnut
  const centerLabel = {
    id: 'centerLabel-' + id,
    afterDraw(chart) {
      const area = chart.chartArea;
      if (!area) return;
      const ctx = chart.ctx;
      const cx = (area.left + area.right) / 2;
      const cy = (area.top + area.bottom) / 2;
      const size = Math.max(11, Math.round((area.right - area.left) / 6));
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#043000';
      ctx.font = `700 ${size}px 'DM Sans', sans-serif`;
      ctx.fillText(donePct + '%', cx, cy);
      ctx.restore();
    }
  };

  ecoCharts[id] = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: ['Done','In Progress','To Do'],
      datasets: [{
        data: total===0 ? [1,0,0] : [done, inProg, todo],
        backgroundColor: total===0
          ? ['rgba(4,48,0,0.08)','transparent','transparent']
          : ['#043000','#efb001','#f094a3'],
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const val = ctx.raw;
              const pct = total ? Math.round(val/total*100) : 0;
              return ` ${val} (${pct}%)`;
            }
          }
        }
      }
    },
    plugins: [centerLabel]
  });
}

/* ── ROUTER ──────────────────────────────────────── */
let APP = { data: null, meetings: [] };

function slugify(s) { return s.replace(/[\s\/]+/g,'-').toLowerCase(); }
function goEco(eco) { location.hash = '#/eco/' + slugify(eco); }

function render(data, meetings) {
  APP = { data, meetings };
  route();
}

function route() {
  if (!APP.data) return;
  const m = (location.hash || '').match(/^#\/eco\/(.+)$/);
  if (m) {
    const eco = ECOSYSTEMS.find(e => slugify(e) === decodeURIComponent(m[1]));
    if (eco) { renderEcosystem(eco, APP.data, APP.meetings); window.scrollTo(0, 0); return; }
  }
  renderHome(APP.data, APP.meetings);
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', route);

function renderHome(data, meetings) {
  const { tasks, habitDefs, habitDays, inventory, finance, wishlist, timetrack } = data;
  const now = today();
  const ts  = todayStr();
  const week = getWeek();

  // Today's tasks
  const plateTasks = tasks.filter(t =>
    t.intendedDate && t.intendedDate.startsWith(ts) && t.status !== 'Done'
  );

  // Today's meetings (sorted, timed first then all-day)
  const todayMeetings = meetings
    .filter(m => m.date === ts)
    .sort((a, b) => {
      if (a.allDay && !b.allDay) return 1;
      if (!a.allDay && b.allDay) return -1;
      return a.start.localeCompare(b.start);
    });

  const TYPE_COLORS = { MIND:'#5b8def', BODY:'#e24d49', SOUL:'#b07cf0', ENVIRONMENT:'#3fae6a' };
  const HABIT_TYPE_ORDER = ['MIND','BODY','SOUL','ENVIRONMENT'];
  const hDefs = habitDefs || [];
  const todayChecks = ((habitDays||[]).find(d => d.date === ts) || {}).checks || {};
  const isHabitDone = (name) => !!todayChecks[name];
  const habitsDoneToday = hDefs.filter(h => isHabitDone(h.name)).length;
  const lowStock     = inventory.filter(i => i.status==='Low' || i.status==='Order Soon');
  const bills        = finance.filter(f => f.type==='Bill' || f.type==='Subscription');

  const thisMonth = (timetrack||[]).filter(t => {
    if (!t.date) return false;
    const d = new Date(t.date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  const totalEarned = thisMonth.reduce((s,t) => s+(t.totalAmount||0), 0);

  const app = document.getElementById('app');
  app.innerHTML = `
    <h1 class="dashboard-title">The Whole Thing: My Current State of Affairs</h1>
    <p class="dashboard-date">${fmtDate(now)}</p>

    <!-- ── ROW 1 ───────────────────────────────────── -->
    <div class="row-three">

      <!-- What's on My Plate Today -->
      <div class="green-card">
        <div class="card-label">🍽️ What's on My Plate Today?</div>

        ${todayMeetings.length > 0 ? `
          ${todayMeetings.map(m => `
            <div class="meeting-row">
              <span class="meeting-time-badge" style="background:${m.color}30;color:${m.color};border:1px solid ${m.color}50">
                ${m.allDay ? 'All day' : fmtCalTime(m.start)}
              </span>
              <span class="meeting-title-text">${m.title}</span>
            </div>`).join('')}
          ${plateTasks.length > 0 ? `<hr class="plate-divider"><div class="plate-sub-label">Tasks</div>` : ''}
        ` : ''}

        ${plateTasks.length === 0 && todayMeetings.length === 0
          ? `<div class="empty-light">Your plate is clear today ✨</div>`
          : plateTasks.map(t => `
              <div class="task-row">
                <div class="task-name">${t.task}${t.blocked?' 🚫':''}</div>
                <div class="tags">
                  ${priorityTag(t.priority)}
                  ${t.ecosystem?`<span class="tag tag-eco">${t.ecosystem}</span>`:''}
                  ${t.timeEst?`<span class="tag tag-time">${t.timeEst}m</span>`:''}
                  ${energyTag(t.energyLevel)}
                </div>
              </div>`).join('')
        }
      </div>

      <!-- Becoming: My Daily Habits -->
      <div class="green-card">
        <div class="card-label">🌱 Becoming: My Daily Habits</div>
        ${hDefs.length===0
          ? `<div class="empty-light">No habits yet</div>`
          : HABIT_TYPE_ORDER.map(type => {
              const hs = hDefs.filter(h => h.type===type);
              if (!hs.length) return '';
              return `
                <div class="habit-type-label" style="color:${TYPE_COLORS[type]}">${type}</div>
                ${hs.map(h => `
                  <div class="habit-row">
                    <div class="habit-dot${isHabitDone(h.name)?' done':''}" style="border-color:${TYPE_COLORS[type]}${isHabitDone(h.name)?`;background:${TYPE_COLORS[type]}`:''}"></div>
                    <span class="habit-name">${h.name}</span>
                  </div>`).join('')}`;
            }).join('')
        }
        ${hDefs.length>0 ? `<div class="habit-score">${habitsDoneToday} / ${hDefs.length} completed today</div>` : ''}
      </div>

      <!-- Resources + Reserves Alerts -->
      <div class="green-card">
        <div class="card-label">🪣 Resources + Reserves Alerts</div>
        ${lowStock.length===0
          ? `<div class="empty-light">All stocked up! 🎉</div>`
          : lowStock.map(i => `
            <div class="alert-row">
              <div class="alert-info">
                <div class="alert-item-name">${i.item}</div>
                ${i.category?`<div class="alert-cat">${i.category}</div>`:''}
              </div>
              <span class="tag ${i.status==='Low'?'tag-low-inv':'tag-order'}">${i.status}</span>
            </div>`).join('')
        }
      </div>
    </div>

    <!-- ── WEEK STRIP ──────────────────────────────── -->
    <div class="section-header">The Rest of the Story <em>(Week in Review)</em></div>
    <div class="week-strip">
      ${week.map((day,i) => {
        const ds = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
        const dayTasks    = tasks.filter(t => t.intendedDate && t.intendedDate.startsWith(ds));
        const dayMeetings = meetings.filter(m => m.date === ds && !m.allDay)
          .sort((a,b) => a.start.localeCompare(b.start));
        const isToday = sameDay(day, now);
        const totalItems = dayMeetings.length + dayTasks.length;

        // Show up to 4 items total, meetings first
        const meetingsToShow = dayMeetings.slice(0, Math.min(2, 4));
        const tasksToShow    = dayTasks.slice(0, Math.max(0, 4 - meetingsToShow.length));
        const overflow       = totalItems - meetingsToShow.length - tasksToShow.length;

        return `
          <div class="day-card${isToday?' today':''}">
            <div class="day-letter">${DAYS[i]}</div>
            <div class="day-num">${day.getMonth()+1}/${day.getDate()}</div>
            ${totalItems === 0
              ? `<div class="day-open">open</div>`
              : `
                ${meetingsToShow.map(m =>
                  `<div class="day-meeting-chip" style="border-left-color:${m.color}">
                    ${fmtCalTime(m.start)} ${truncate(m.title, 16)}
                  </div>`
                ).join('')}
                ${tasksToShow.map(t =>
                  `<div class="day-task-chip">${truncate(t.task, 20)}</div>`
                ).join('')}
                ${overflow > 0 ? `<div class="day-more">+${overflow} more</div>` : ''}
              `
            }
          </div>`;
      }).join('')}
    </div>

    <!-- ── ECOSYSTEM REVIEW ────────────────────────── -->
    <div class="section-header">Ecosystem Review</div>
    <div class="eco-grid">
      ${ECOSYSTEMS.map(eco => {
        const et = tasks.filter(t => t.ecosystem===eco);
        const done  = et.filter(t => t.status==='Done').length;
        const inProg= et.filter(t => t.status==='In Progress').length;
        const todo  = et.filter(t => !['Done','In Progress'].includes(t.status)).length;
        const total = et.length;
        const donePct = total ? Math.round(done/total*100) : 0;
        const id = 'eco-'+eco.replace(/[\s\/]+/g,'-').toLowerCase();
        return `
          <div class="eco-card eco-card-link" onclick="goEco('${eco.replace(/'/g,"\\'")}')" title="Open ${eco}">
            <div class="eco-name">${eco}</div>
            <div class="eco-chart-wrap"><canvas id="${id}"></canvas></div>
            <div class="eco-legend">
              <div class="eco-leg-item"><div class="eco-leg-dot" style="background:#043000"></div>${done} done (${donePct}%)</div>
              <div class="eco-leg-item"><div class="eco-leg-dot" style="background:#efb001"></div>${inProg} in progress</div>
              <div class="eco-leg-item"><div class="eco-leg-dot" style="background:#f094a3"></div>${todo} to do</div>
            </div>
            <div class="eco-open-hint">View page →</div>
          </div>`;
      }).join('')}
    </div>

    <!-- ── PROVISION PLANNING ──────────────────────── -->
    <div class="section-header">Provision Planning</div>
    <div class="provision-grid">

      <!-- Love Letters from Capitalism -->
      <div class="provision-card">
        <div class="provision-title">💌 Love Letters from Capitalism</div>
        ${bills.length===0
          ? `<div class="empty-dark">No bills found</div>`
          : bills.map(b => `
            <div class="bill-row">
              <span class="bill-name">${b.name}</span>
              <span class="bill-amt">${fmt$(b.amount)}<span style="font-size:0.6rem;font-weight:400;opacity:0.6">/mo</span></span>
            </div>`).join('')
        }
        ${bills.length>0 ? `
          <div style="margin-top:10px;padding-top:8px;border-top:2px solid var(--green3);display:flex;justify-content:space-between;font-size:0.8rem;font-weight:700;color:var(--green)">
            <span>Monthly Total</span>
            <span style="color:var(--coral)">${fmt$(bills.reduce((s,b)=>s+(b.amount||0),0))}</span>
          </div>` : ''}
      </div>

      <!-- Monthly Budget Tracker -->
      <div class="provision-card">
        <div class="provision-title">📊 Monthly Budget Tracker</div>
        ${(() => {
          const types = [...new Set(finance.filter(f=>f.target).map(f=>f.type))].filter(Boolean);
          if (types.length===0) return `<div class="empty-dark">Add budget targets in Finance</div>`;
          return types.map(type => {
            const items  = finance.filter(f=>f.type===type);
            const spent  = items.reduce((s,f)=>s+(f.amount||0),0);
            const target = items.reduce((s,f)=>s+(f.target||0),0);
            if (!target) return '';
            const pct   = Math.min(100, Math.round(spent/target*100));
            const color = pct>90?'var(--coral)':pct>65?'var(--gold)':'var(--green)';
            return `
              <div class="budget-row">
                <div class="budget-lbl">
                  <span>${type}</span>
                  <span>${fmt$(spent)} / ${fmt$(target)}</span>
                </div>
                <div class="bar-bg">
                  <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
                </div>
              </div>`;
          }).join('');
        })()}
      </div>

      <!-- Wish List -->
      <div class="provision-card gold">
        <div class="provision-title">⭐ Wish List</div>
        ${(wishlist||[]).length===0
          ? `<div class="empty-dark">Nothing on the list yet</div>`
          : (wishlist||[]).slice(0,7).map(w => `
            <div class="wish-row">
              <div>
                <div class="wish-name">${w.item}</div>
                ${w.store?`<div class="wish-store">${w.store}</div>`:''}
              </div>
              <span class="wish-cost">${fmt$(w.cost)}</span>
            </div>`).join('')
        }
      </div>

      <!-- Parker Wells Time Tracker -->
      <div class="provision-card gold">
        <div class="provision-title">⏱️ Parker Wells Time Tracker</div>

        <div class="pw-timer">
          <div id="pw-clock" class="pw-clock">00:00:00</div>
          <div class="pw-btns">
            <button id="pw-start" class="pw-btn">▶ Start</button>
            <button id="pw-reset" class="pw-btn ghost">Reset</button>
          </div>
          <div class="pw-fields">
            <input id="pw-project" type="text" placeholder="What are you working on?" />
            <div class="pw-two">
              <select id="pw-client">
                <option value="">Client…</option>
                <option value="Maroon COS">Maroon COS</option>
                <option value="GOTR">GOTR</option>
                <option value="Other">Other</option>
              </select>
              <input id="pw-rate" type="number" min="0" step="1" placeholder="Rate $/hr" />
            </div>
            <div id="pw-manual-wrap" style="display:none">
              <input id="pw-manual" type="number" min="0" step="0.25" placeholder="Hours worked" />
              <div class="pw-two" style="margin-top:6px">
                <input id="pw-date" type="date" title="Date worked" />
                <input id="pw-time" type="time" title="Approx. time of day" />
              </div>
            </div>
            <input id="pw-notes" type="text" placeholder="Notes (optional)" />
          </div>
          <button id="pw-log" class="pw-log">Log to Notion</button>
          <span id="pw-toggle" class="pw-toggle">Enter hours manually instead</span>
          <div id="pw-status" class="pw-status"></div>
        </div>

        ${thisMonth.length===0
          ? `<div class="empty-dark">No time logged this month</div>`
          : thisMonth.slice(0,5).map(t => `
            <div class="time-row">
              <div class="time-project">${t.project}</div>
              <div class="time-meta">${[t.client, t.hoursWorked?t.hoursWorked+'h':null, fmt$(t.totalAmount)].filter(Boolean).join(' · ')}</div>
            </div>`).join('')
        }
        ${thisMonth.length>0 ? `
          <div class="time-total">
            <span>This Month</span>
            <span>${fmt$(totalEarned)}</span>
          </div>` : ''}
      </div>
    </div>
    <!-- ── BECOMING: MONTHLY RHYTHM (rings) — moved to bottom ─ -->
    <div class="section-header">Becoming <em>(My Monthly Rhythm)</em></div>
    <div class="rhythm-wrap">${monthlyRhythmInner(data)}</div>

  `;

  // Render ecosystem pie charts after DOM is ready
  requestAnimationFrame(() => {
    ECOSYSTEMS.forEach(eco => {
      const et = tasks.filter(t => t.ecosystem===eco);
      const done   = et.filter(t => t.status==='Done').length;
      const inProg = et.filter(t => t.status==='In Progress').length;
      const todo   = et.filter(t => !['Done','In Progress'].includes(t.status)).length;
      const id = 'eco-'+eco.replace(/[\s\/]+/g,'-').toLowerCase();
      renderEcoChart(id, done, inProg, todo);
    });
    mountPwTimer();
  });
}

/* ── INTERIOR ECOSYSTEM PAGE ─────────────────────── */
const ECO_BLURBS = {
  'Personal':      'Home, habits, health & finances — the foundation everything else runs on.',
  'GOTR':          'Girls on the Run — wrapping mode, grant-heavy, time-sensitive.',
  'Maroon':        'Building mode — getting the org and systems stood up.',
  'Mellow Yellow': 'Maintenance mode — keep it steady and serving customers.',
  'APC':           'At Peace Collective — vision mode, building toward what’s next.',
  'Parker Wells':  'The business umbrella — client work, hours & income.',
  'Job Search':    'Active and temporary — landing the next right role.',
};

function assigneeTag(a) {
  if (!a) return '';
  const k = a.toLowerCase();
  const cls = k.includes('claude') ? 'claude'
            : k.includes('external') ? 'external'
            : (k.includes('together') || k.includes('us')) ? 'together'
            : 'me';
  return `<span class="tag tag-assignee-${cls}">${a}</span>`;
}

function dueTag(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  const today0 = new Date(); today0.setHours(0,0,0,0);
  const overdue = d < today0;
  const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  return `<span class="tag ${overdue ? 'tag-overdue' : 'tag-due'}">${overdue ? 'Overdue · ' : 'Due '}${label}</span>`;
}

function taskCard(t) {
  const isDone = t.status === 'Done';
  return `
    <div class="task-row${isDone ? ' task-done' : ''}">
      <div class="task-name">${t.task || 'Untitled'}${t.blocked ? ' 🚫' : ''}</div>
      <div class="tags">
        ${priorityTag(t.priority)}
        ${dueTag(t.dueDate)}
        ${t.timeEst ? `<span class="tag tag-time">${t.timeEst}m</span>` : ''}
        ${assigneeTag(t.assignee)}
        ${energyTag(t.energyLevel)}
        ${t.frequency ? `<span class="tag tag-low">${t.frequency}</span>` : ''}
      </div>
    </div>`;
}

function renderEcosystem(eco, data, meetings) {
  const { tasks } = data;
  const et = (tasks || []).filter(t => t.ecosystem === eco);

  const inProg = et.filter(t => t.status === 'In Progress');
  const todo   = et.filter(t => !['Done','In Progress'].includes(t.status));
  const done   = et.filter(t => t.status === 'Done');

  // Sort active tasks: due date soonest first, then by priority weight
  const pw = p => p && p.includes('Urgent') ? 0 : p === 'High' ? 1 : p === 'Medium' ? 2 : 3;
  const byDuePri = (a, b) => {
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return pw(a.priority) - pw(b.priority);
  };
  inProg.sort(byDuePri);
  todo.sort(byDuePri);

  // Notes: any task in this ecosystem carrying a note
  const noted = et.filter(t => t.notes && t.notes.trim());

  // Activity log: completed tasks, most recent first
  const logged = done
    .filter(t => t.completedDate)
    .sort((a, b) => b.completedDate.localeCompare(a.completedDate))
    .slice(0, 15);

  const totalEst = et.filter(t => t.status !== 'Done').reduce((s,t) => s + (t.timeEst || 0), 0);
  const estLabel = totalEst >= 60 ? `${(totalEst/60).toFixed(1)}h` : `${totalEst}m`;

  const groupBlock = (label, arr) => arr.length
    ? `<div class="task-group-label">${label} (${arr.length})</div>${arr.map(taskCard).join('')}`
    : '';

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="back-link" onclick="location.hash=''">← Command Center</div>
    <h1 class="dashboard-title">${eco}</h1>
    <p class="dashboard-date">${ECO_BLURBS[eco] || ''}</p>

    <div class="stat-strip">
      <div class="stat-pill"><div class="stat-num">${et.length}</div><div class="stat-lbl">Total tasks</div></div>
      <div class="stat-pill"><div class="stat-num">${inProg.length}</div><div class="stat-lbl">In progress</div></div>
      <div class="stat-pill"><div class="stat-num">${todo.length}</div><div class="stat-lbl">To do</div></div>
      <div class="stat-pill"><div class="stat-num">${done.length}</div><div class="stat-lbl">Done</div></div>
      <div class="stat-pill"><div class="stat-num">${estLabel}</div><div class="stat-lbl">Est. remaining</div></div>
    </div>

    <div class="section-header">Tasks</div>
    <div class="green-card">
      <div class="card-label">📋 ${eco} Tasks</div>
      ${et.length === 0
        ? `<div class="empty-light">No tasks tagged to ${eco} yet ✨</div>`
        : `${groupBlock('In Progress', inProg)}
           ${groupBlock('To Do', todo)}
           ${groupBlock('Done', done)}`}
    </div>

    <div class="section-header">Notes &amp; Logs</div>
    <div class="${eco === 'Personal' ? 'row-three' : 'row-two'}">
      <div class="green-card">
        <div class="card-label">📝 Notes</div>
        ${noted.length === 0
          ? `<div class="empty-light">No notes yet. Add a note to any ${eco} task in Notion and it'll show here.</div>`
          : noted.map(t => `
              <div class="note-row">
                <div class="note-src">${t.task || 'Untitled'}</div>
                <div class="note-body">${t.notes}</div>
              </div>`).join('')}
      </div>
      <div class="green-card">
        <div class="card-label">✓ Activity Log</div>
        ${logged.length === 0
          ? `<div class="empty-light">Completed tasks will appear here as you check them off.</div>`
          : logged.map(t => {
              const d = new Date(t.completedDate + 'T00:00:00');
              const ds = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
              return `<div class="log-row"><span class="log-date">${ds}</span><span class="log-text">${t.task || 'Untitled'}</span></div>`;
            }).join('')}
      </div>
      ${eco === 'Personal' ? `
      <div class="green-card rhythm-compact">
        <div class="card-label">🌱 Monthly Rhythm</div>
        ${monthlyRhythmInner(data)}
      </div>` : ''}
    </div>
  `;
}

/* ── PARKER WELLS TIMER ───────────────────────────── */
const PW_KEY = 'pwTimerState';
let pwTick = null;

function pwLoad() {
  try { return JSON.parse(localStorage.getItem(PW_KEY)) || {}; }
  catch { return {}; }
}
function pwSave(s) {
  try { localStorage.setItem(PW_KEY, JSON.stringify(s)); } catch {}
}
function pwElapsedMs(s) {
  const acc = s.accumulatedMs || 0;
  return s.running && s.startedAt ? acc + (Date.now() - s.startedAt) : acc;
}
function pwFmtClock(ms) {
  const tot = Math.floor(ms / 1000);
  const h = String(Math.floor(tot / 3600)).padStart(2, '0');
  const m = String(Math.floor((tot % 3600) / 60)).padStart(2, '0');
  const s = String(tot % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}
function pwNowClock() {
  const d = new Date();
  let h = d.getHours(); const m = d.getMinutes();
  const ap = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return m === 0 ? `${h}${ap}` : `${h}:${String(m).padStart(2,'0')}${ap}`;
}
// Convert a 24h "HH:MM" (from <input type=time>) → friendly "2pm" / "2:30pm"
function pwFmt24to12(t) {
  if (!t) return '';
  const [H, M] = t.split(':').map(Number);
  if (isNaN(H)) return '';
  const ap = H >= 12 ? 'pm' : 'am';
  const h = H % 12 || 12;
  return M ? `${h}:${String(M).padStart(2,'0')}${ap}` : `${h}${ap}`;
}

function mountPwTimer() {
  const clock  = document.getElementById('pw-clock');
  if (!clock) return;
  const startBtn = document.getElementById('pw-start');
  const resetBtn = document.getElementById('pw-reset');
  const logBtn   = document.getElementById('pw-log');
  const toggle   = document.getElementById('pw-toggle');
  const manual   = document.getElementById('pw-manual');
  const manualWrap = document.getElementById('pw-manual-wrap');
  const dateInput  = document.getElementById('pw-date');
  const timeInput  = document.getElementById('pw-time');
  const statusEl = document.getElementById('pw-status');
  let manualMode = false;

  // Default the manual date picker to today
  if (dateInput && !dateInput.value) dateInput.value = todayStr();

  function paint() {
    const s = pwLoad();
    clock.textContent = pwFmtClock(pwElapsedMs(s));
    clock.classList.toggle('running', !!s.running);
    startBtn.textContent = s.running ? '⏸ Pause' : '▶ Start';
  }
  function startTick() {
    if (pwTick) clearInterval(pwTick);
    pwTick = setInterval(paint, 1000);
  }

  startBtn.onclick = () => {
    const s = pwLoad();
    if (s.running) {
      // pause: bank elapsed
      s.accumulatedMs = pwElapsedMs(s);
      s.running = false;
      s.startedAt = null;
      if (pwTick) { clearInterval(pwTick); pwTick = null; }
    } else {
      if (!s.startClock && !(s.accumulatedMs > 0)) s.startClock = pwNowClock();
      s.running = true;
      s.startedAt = Date.now();
      startTick();
    }
    pwSave(s);
    paint();
  };

  resetBtn.onclick = () => {
    if (pwTick) { clearInterval(pwTick); pwTick = null; }
    pwSave({});
    statusEl.textContent = '';
    paint();
  };

  toggle.onclick = () => {
    manualMode = !manualMode;
    manualWrap.style.display = manualMode ? 'block' : 'none';
    clock.style.display = manualMode ? 'none' : 'block';
    startBtn.parentElement.style.display = manualMode ? 'none' : 'flex';
    toggle.textContent = manualMode ? 'Use the timer instead' : 'Enter hours manually instead';
  };

  logBtn.onclick = async () => {
    const project = document.getElementById('pw-project').value.trim();
    const client  = document.getElementById('pw-client').value;
    const rate    = document.getElementById('pw-rate').value;
    const notes   = document.getElementById('pw-notes').value.trim();
    const s = pwLoad();

    let hours, startTime = '', endTime = '';
    let logDate = new Date().toISOString().slice(0,10);
    if (manualMode) {
      hours = parseFloat(manual.value);
      startTime = pwFmt24to12(timeInput.value);   // approximate time of day → Start Time
      if (dateInput.value) logDate = dateInput.value;
    } else {
      hours = Math.round((pwElapsedMs(s) / 3600000) * 100) / 100;
      startTime = s.startClock || '';
      endTime = pwNowClock();
    }

    if (!project) { statusEl.className = 'pw-status err'; statusEl.textContent = 'Add what you worked on.'; return; }
    if (!hours || hours <= 0) { statusEl.className = 'pw-status err'; statusEl.textContent = 'No time to log yet.'; return; }

    logBtn.disabled = true;
    statusEl.className = 'pw-status';
    statusEl.textContent = 'Saving…';
    try {
      const res = await fetch('/api/log-time', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project, client, rate, notes, hoursWorked: hours, startTime, endTime,
          date: logDate }),
      });
      const out = await res.json();
      if (!res.ok || out.error) throw new Error(out.error || `Error ${res.status}`);
      if (pwTick) { clearInterval(pwTick); pwTick = null; }
      pwSave({});
      statusEl.className = 'pw-status ok';
      statusEl.textContent = `Logged ${hours}h ✓`;
      setTimeout(load, 1200);
    } catch (e) {
      statusEl.className = 'pw-status err';
      statusEl.textContent = e.message;
      logBtn.disabled = false;
    }
  };

  // restore on mount
  paint();
  if (pwLoad().running) startTick();
}

async function load() {
  try {
    // Fetch Notion data and Google Calendar in parallel
    // Calendar gracefully returns [] if env vars aren't set yet
    const [notionRes, calRes] = await Promise.all([
      fetch('/api/notion'),
      fetch('/api/calendar').catch(() => ({ ok: true, json: async () => ({ meetings: [] }) })),
    ]);

    if (!notionRes.ok) throw new Error(`Notion API error ${notionRes.status}`);

    const data     = await notionRes.json();
    const calData  = calRes.ok ? await calRes.json() : { meetings: [] };
    const meetings = calData.meetings || [];

    render(data, meetings);
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:var(--coral)">Couldn't load data: ${e.message}</div>`;
  }
}

load();
</script>
